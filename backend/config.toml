# Kidly Voice — runtime configuration
# All rate limits use the format "<count>/<period>"
# Valid periods: second, minute, hour, day
# Changes take effect on the next deploy (fly deploy).

[voices]
# Fallback voice used when a user has no credentials (demo / lost-session mode).
# Set to empty string "" to disable demo mode and send users straight to recording.
# Change this value and run `fly deploy` — no code change needed.
default_voice_id = "MXGyTMlsvQgQ4BL0emIa"

[cors]
# Allowed origins for local development.
# In production set CORS_ORIGINS env var: fly secrets set CORS_ORIGINS=https://kidly-voice.fly.dev
origins = ["http://localhost:5173", "http://localhost:8000", "http://localhost:3000"]

[uploads]
# Maximum size per recording chunk in megabytes. Rejects oversized uploads early.
# 20 MB comfortably fits 60s of WAV at 48 kHz / 16-bit / stereo (~11 MB).
max_recording_mb = 20

# Maximum total bytes ever stored under a single session_id before the upload
# endpoint starts returning 413. Bounds disk usage if someone spams uploads
# without ever calling /api/voice/clone.
max_session_mb = 40

[rate_limits]
# Applied to every route that has no specific override below.
global_default          = "60/minute"

# Voice recording upload chunks (multiple per session).
recording_upload        = "30/minute"

# Voice cloning — hits Fish Audio and costs money. Keep this tight.
voice_clone             = "5/hour"

# Preview clip generation — also hits Fish Audio.
voice_preview           = "10/hour"

# Story TTS — hits Fish Audio only on the very first play per user+story.
story_speak_timestamped = "30/hour"

# Magic link auth — keep tight to prevent email flooding and token brute-force.
magic_link_send         = "3/hour"
magic_link_verify       = "10/hour"

# Feedback form submissions.
feedback                = "5/hour"
