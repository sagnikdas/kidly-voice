app = "kidly-voice"
primary_region = "bom"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "kidly_data"
  destination = "/app/tmp"
  initial_size = "3gb"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
